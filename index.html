<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Collatz Explorer</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      background: #1a1a2e;
      color: #c8c8d4;
      font-family: 'SF Mono', ui-monospace, Menlo, monospace;
      margin: 0;
      padding: 24px;
    }

    h1 {
      color: #e0e0ec;
      font-weight: 400;
      font-size: 1.4em;
      margin: 0 0 16px;
    }

    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    input,
    button {
      background: #16213e;
      color: #c8c8d4;
      border: 1px solid #334;
      padding: 6px 10px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.85em;
    }

    button {
      cursor: pointer;
    }

    button:hover {
      border-color: #668;
    }

    label {
      font-size: 0.85em;
      color: #888;
    }

    input[type="number"] {
      width: 80px;
      text-align: center;
    }

    .controls .range-input {
      width: 60px;
    }

    .info {
      font-size: 0.75em;
      color: #556;
      margin-bottom: 8px;
    }

    pre {
      background: #0f0f1a;
      border: 1px solid #222;
      border-radius: 4px;
      padding: 12px;
      font-size: 0.8em;
      line-height: 1.4;
      width: fit-content;
      max-height: 60vh;
      overflow: auto;
    }

    canvas {
      background: #0f0f1a;
      border: 1px solid #222;
      border-radius: 4px;
      display: block;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h1>Collatz Explorer</h1>

  <div class="controls">
    <label>
      n
      <input id="n" type="number" value="27" min="1" max="1000000">
    </label>
    <button id="run-btn" type="button">Run</button>

    <label>
      batch
      <input id="from" class="range-input" type="number" value="1" min="1" max="1000000">
      to
      <input id="to" class="range-input" type="number" value="100" min="1" max="1000000">
    </label>
    <button id="batch-btn" type="button">Batch</button>
  </div>

  <div id="info" class="info"></div>
  <canvas id="chart" width="800" height="250"></canvas>
  <pre id="out"></pre>

  <script>
    const $ = (id) => document.getElementById(id);
    const fmt = (n) => Number(n).toLocaleString();

    async function fetchJSON(url) {
      const res = await fetch(url);
      return res.json();
    }

    function showError(message) {
      $('out').textContent = message;
    }

    async function run() {
      const n = $('n').value;
      const r = await fetchJSON(`/trajectory?n=${n}`);
      if (r.error) {
        showError(r.error);
        return;
      }
      $('info').textContent =
        `start: ${r.start} | steps: ${r.steps} | peak: ${fmt(r.peak)}`;
      $('out').textContent = r.sequence.join(' > ');
      drawChart(r.sequence);
    }

    async function batch() {
      const from = $('from').value;
      const to = $('to').value;
      const r = await fetchJSON(`/batch?from=${from}&to=${to}`);
      if (r.error) {
        showError(r.error);
        return;
      }
      const longest = Math.max(...r.map((x) => x.steps));
      const highest = Math.max(...r.map((x) => x.peak));
      $('info').textContent =
        `${r.length} numbers | longest: ${longest} steps | highest peak: ${fmt(highest)}`;
      $('out').textContent = r
        .map((x) => `${String(x.start).padStart(6)} > ${x.steps} steps, peak ${fmt(x.peak)}`)
        .join('\n');
      drawChart(r.map((x) => x.steps));
    }

    function drawChart(data) {
      const canvas = $('chart');
      const ctx = canvas.getContext('2d');
      const max = Math.max(...data) || 1;
      const barWidth = canvas.width / data.length;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      data.forEach((value, i) => {
        const height = (value / max) * (canvas.height - 20);
        const ratio = value / max;
        ctx.fillStyle = `hsl(${220 + ratio * 60}, 50%, ${40 + ratio * 30}%)`;
        ctx.fillRect(i * barWidth, canvas.height - height, Math.max(barWidth - 0.5, 1), height);
      });
    }

    $('run-btn').addEventListener('click', run);
    $('batch-btn').addEventListener('click', batch);

    run();
  </script>
</body>
</html>
